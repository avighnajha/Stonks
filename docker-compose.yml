version: '3.8'

services:
  # The single PostgreSQL database
  postgres_db:
    image: postgres:14-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stonks_main_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api_gateway:
    build:
      context: ./services/api_gateway
    command: npm run start:dev
    ports:
      - "8080:8080"
    volumes:
      - ./services/api_gateway:/usr/src/app
      # --- THE FIX ---
      - /usr/src/app/node_modules
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - USER_SERVICE_URL=http://user_service:3001
      - WALLET_SERVICE_URL=http://wallet_service:3002
      - MARKETPLACE_SERVICE_URL=http://marketplace_service:3003
      - TRADING_SERVICE_URL=http://trading_service:3004
      - PORTFOLIO_SERVICE_URL=http://portfolio_service:3005
    depends_on:
      - user_service
      - wallet_service
      - marketplace_service
      - trading_service
      - portfolio_service

  user_service:
    build:
      context: ./services/user_service
    command: npm run start:dev
    volumes:
      - ./services/user_service:/usr/src/app
      # --- THE FIX ---
      - /usr/src/app/node_modules
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://user:password@postgres_db:5432/stonks_main_db
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    depends_on:
      - postgres_db

  wallet_service:
    build:
      context: ./services/wallet_service
    command: npm run start:dev
    volumes:
      - ./services/wallet_service:/usr/src/app
      # --- THE FIX ---
      - /usr/src/app/node_modules
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://user:password@postgres_db:5432/stonks_main_db
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    depends_on:
      - postgres_db

  marketplace_service:
    build:
      context: ./services/marketplace_service
    command: npm run start:dev
    volumes:
      - ./services/marketplace_service:/usr/src/app
      # --- THE FIX ---
      - /usr/src/app/node_modules
    environment:
      - PORT=3003
      - DATABASE_URL=postgresql://user:password@postgres_db:5432/stonks_main_db
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    depends_on:
      - postgres_db

  trading_service:
    build:
      context: ./services/trading_service
    command: npm run start:dev
    volumes:
      - ./services/trading_service:/usr/src/app
      # --- THE FIX ---
      - /usr/src/app/node_modules
    environment:
      - PORT=3004
      - DATABASE_URL=postgresql://user:password@postgres_db:5432/stonks_main_db
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    depends_on:
      - postgres_db

  portfolio_service:
    build:
      context: ./services/portfolio_service
    command: npm run start:dev
    volumes:
      - ./services/portfolio_service:/usr/src/app
      # --- THE FIX ---
      - /usr/src/app/node_modules
    environment:
      - PORT=3005
      - DATABASE_URL=postgresql://user:password@postgres_db:5432/stonks_main_db
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    depends_on:
      - postgres_db

volumes:
  postgres_data: